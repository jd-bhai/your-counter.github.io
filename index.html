<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;background-image:radial-gradient(ellipse at 20% 50%,rgba(14,52,96,.4),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(233,69,96,.15),transparent 50%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Mono',monospace;user-select:none}
.title-wrap{position:relative;display:inline-flex;align-items:center;margin-bottom:2rem;cursor:pointer}
.t{font-family:'Bebas Neue',sans-serif;color:#a8dadc;font-size:clamp(1.4rem,4vw,2rem);letter-spacing:.25em;opacity:.85;white-space:nowrap}
.edit-icon{position:absolute;bottom:-6px;right:-22px;font-size:.85rem;opacity:0;transition:opacity .2s;pointer-events:none;color:#a8dadc}
.title-wrap:hover .edit-icon{opacity:1}
.name-form{display:flex;gap:.5rem;margin-bottom:2rem;align-items:center}
.name-form input{font-family:'Space Mono',monospace;font-size:.9rem;padding:6px 12px;border-radius:8px;border:1.5px solid #0f3460;background:#16213e;color:#a8dadc;outline:none;letter-spacing:.1em;width:200px}
.name-form input:focus{border-color:#a8dadc}
.name-form button{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;padding:6px 16px;border:none;border-radius:8px;background:#0f3460;color:#a8dadc;cursor:pointer;transition:background .15s}
.name-form button:hover{background:#1a4a80}
.p{background:#16213e;border:2px solid #0f3460;border-radius:20px;padding:3rem 4rem;display:flex;flex-direction:column;align-items:center;gap:2.5rem;box-shadow:0 0 0 1px rgba(168,218,220,.05),0 20px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05)}
#c{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,20vw,9rem);color:#e94560;line-height:1;letter-spacing:.05em;text-shadow:0 0 20px rgba(233,69,96,.5),0 4px 0 rgba(100,0,20,.8);text-align:center;transition:transform .05s,font-size .15s;max-width:90vw;overflow:hidden}
#c.k{transform:scale(1.08)}
.r{display:flex;gap:1.5rem}
.b{position:relative;border:none;cursor:pointer;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.12em;color:#fff;outline:none;-webkit-tap-highlight-color:transparent;padding:14px 36px 20px;transition:padding .07s}
.b::after{content:'';position:absolute;inset:0;border-radius:10px;box-shadow:0 6px 0 var(--s);transition:box-shadow .07s,transform .07s}
.b:active,.b.on{padding-bottom:14px}
.b:active::after,.b.on::after{box-shadow:0 1px 0 var(--s);transform:translateY(5px)}
.i{background:linear-gradient(180deg,#96a6ff,#778bff 40%,#5a6fe8);--s:#3a4fd4;box-shadow:0 8px 20px rgba(55,79,220,.45)}
.d{background:linear-gradient(180deg,#ff7a7a,#ff4d4d 40%,#d93030);--s:#cc1a1a;box-shadow:0 8px 20px rgba(200,30,30,.45)}
.x{background:linear-gradient(180deg,#5a5a7e,#3a3a5c 40%,#252545);--s:#1a1a3a;font-size:1rem;padding:10px 28px 14px;box-shadow:0 6px 16px rgba(0,0,0,.5);color:#aaa}
.x:active,.x.on{padding-bottom:10px;color:#ccc}
#s{font-size:.65rem;letter-spacing:.1em;color:rgba(168,218,220,.35);height:1rem;transition:color .2s}
#s.on{color:rgba(168,218,220,.75)}
</style>
</head>
<body>
<div id="nameDisplay" class="title-wrap" onclick="showForm()" title="Click to edit">
  <span class="t" id="tLabel">People Counter</span>
  <span class="edit-icon">✏️</span>
</div>
<div id="nameForm" class="name-form" style="display:none">
  <input id="nameInput" maxlength="40" placeholder="Enter a name…"/>
  <button onclick="confirmName()">Confirm</button>
</div>
<div class="p">
  <div id="c">0</div>
  <div id="s">HOLD TO ACCELERATE</div>
  <div class="r">
    <button class="b d" id="db" onmousedown="go('d')" onmouseup="sto()" onmouseleave="sto()" ontouchstart="go('d')" ontouchend="sto()">− DEC</button>
    <button class="b i" id="ib" onmousedown="go('i')" onmouseup="sto()" onmouseleave="sto()" ontouchstart="go('i')" ontouchend="sto()">+ INC</button>
  </div>
  <button class="b x" id="rb" onclick="rst()">↺ RESET</button>
</div>
<script>
// n is BigInt to avoid float precision issues at extreme values
let n=0n, dur=0, act, run=0, lt=0, ac=0, hT, sT;
const C=document.getElementById('c'), S=document.getElementById('s'),
      Bi=document.getElementById('ib'), Bd=document.getElementById('db');

// tiers: [holdMs, label, sps (float), countGate]
// Early tiers (0-4) also gated by count reached; after that hold-time only.
// Rhythm: crawl→slow is gentle (counts 15), slow→medium (150), medium→fast (1500), fast→turbo (15000)
// WARP and below share the same smooth hold ramp feel; LIGHTSPEED+ are pure hold-time bonuses
const TR=[
  [0,     '▶ CRAWL',        8,       0],
  [2e3,   '▶▶ SLOW',        20,      14],
  [5e3,   '▶▶▶ MEDIUM',     85,      140],
  [9e3,   '⚡ FAST',        200,     400],
  [14e3,  '⚡⚡ TURBO',     700,     1400],
  [20e3,  '🔥 HYPER',       2500,    0],
  [28e3,  '💥 ULTRA',       9000,    0],
  [38e3,  '⚡⚡⚡ INSANE',  35000,   0],
  [50e3,  '💀 GODSPEED',    130000,  0],
  [65e3,  '🌀 BEYOND',      500000,  0],
  [85e3,  '☄️ WARP',        3000000, 0],
  [110e3, '🚀 LIGHTSPEED',  9000000, 0],
  [140e3, '♾️ INFINITE',   50000000, 0],
  [170e3, '🌌 OMNISPEED',  800000000, 0],
  [210e3, '🛸 TRANSCENDENT', 5000000000, 0]
];

let tierUnlock=0;
const nNum=()=>Number(n); // safe for comparisons (precision fine for thresholds)

function checkUnlock(){
  while(tierUnlock<4 && nNum()>=TR[tierUnlock+1][3]) tierUnlock++;
}

function getTierIdx(){
  let ti=0;
  for(let i=0;i<TR.length;i++) if(dur>=TR[i][0]) ti=i;
  if(ti<=4) ti=Math.min(ti,tierUnlock);
  return ti;
}

// Magnitude multiplier — purely for display-feel scaling, still +1 per logical step
// BUT: we use BigInt for n so no precision issues
const mul=v=>v>=1e12?1e6:v>=1e9?1e4:v>=1e6?500:v>=1e3?20:1;

function getSps(){
  const ti=getTierIdx();
  const[,l,b]=TR[ti];
  S.textContent=l; S.className='on';
  return b * mul(nNum()||1);
}

// Font fit using canvas measurement
const _cv=document.createElement('canvas').getContext('2d');
function fitFont(){
  const maxW=Math.min(window.innerWidth*.88,600);
  C.style.fontSize=''; // let CSS clamp reset
  let fs=parseFloat(getComputedStyle(C).fontSize);
  _cv.font=`${fs}px 'Bebas Neue'`;
  let tw=_cv.measureText(C.textContent).width;
  while(tw>maxW && fs>24){fs-=2;_cv.font=`${fs}px 'Bebas Neue'`;tw=_cv.measureText(C.textContent).width;}
  C.style.fontSize=fs+'px';
}

function setDisplay(){
  C.textContent=n.toLocaleString();
  fitFont();
}

// RAF loop — accumulator uses plain float, steps converted to BigInt
function loop(ts){
  if(!run) return;
  if(lt){
    const dt=(ts-lt)/1e3;
    // Cap dt to 100ms to prevent huge jumps after tab switch etc.
    ac += getSps() * Math.min(dt, 0.1);
    // Use Math.trunc + clamp to safe integer before BigInt conversion
    const q = Math.trunc(ac);
    if(q >= 1){
      ac -= q;
      n = act==='i' ? n+BigInt(q) : (n>BigInt(q) ? n-BigInt(q) : 0n);
      checkUnlock();
      setDisplay();
    } else if(q < 0){
      // safety: accumulator should never go negative, reset it
      ac = 0;
    }
  }
  lt=ts;
  requestAnimationFrame(loop);
}

const bump=()=>{C.classList.remove('k');void C.offsetWidth;C.classList.add('k');setTimeout(()=>C.classList.remove('k'),80)};

function go(a){
  sto(); act=a; (a==='i'?Bi:Bd).classList.add('on');
  n = act==='i' ? n+1n : (n>0n ? n-1n : 0n);
  checkUnlock(); setDisplay(); bump();
  dur=0; ac=0; tierUnlock=0;
  while(tierUnlock<4 && nNum()>=TR[tierUnlock+1][3]) tierUnlock++;
  hT=setInterval(()=>dur+=50,50);
  sT=setTimeout(()=>{run=1;lt=0;requestAnimationFrame(loop)},400);
}

function sto(){
  run=0; lt=0; ac=0;
  clearInterval(hT); clearTimeout(sT);
  dur=0; act=null;
  Bi.classList.remove('on'); Bd.classList.remove('on');
  S.textContent='HOLD TO ACCELERATE'; S.className='';
}

function rst(){
  sto(); n=0n; tierUnlock=0;
  C.textContent='0'; C.style.fontSize='';
  const r=document.getElementById('rb');
  r.classList.add('on'); setTimeout(()=>r.classList.remove('on'),150);
}

function showForm(){
  document.getElementById('nameDisplay').style.display='none';
  const f=document.getElementById('nameForm'); f.style.display='flex';
  const inp=document.getElementById('nameInput');
  inp.value=document.getElementById('tLabel').textContent;
  inp.focus(); inp.select();
}
function confirmName(){
  const v=document.getElementById('nameInput').value.trim();
  document.getElementById('tLabel').textContent=v||'People Counter';
  document.getElementById('nameForm').style.display='none';
  document.getElementById('nameDisplay').style.display='inline-flex';
}
document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmName()});
document.querySelectorAll('.b').forEach(b=>b.addEventListener('touchstart',e=>e.preventDefault(),{passive:false}));
</script>
</body>
</html>
